name: Validate Reproducibility

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate synthetic data
        run: python scripts/generate-synthetic-telemetry.py

      - name: Generate tables
        run: python scripts/generate-tables.py

      - name: Validate reproducibility metadata
        run: python scripts/validate-reproducibility.py

      - name: Validate artifact index
        run: python scripts/validate-artifacts.py

      - name: Run tests
        run: pytest -q tests

      - name: Compute checksums
        run: python scripts/compute-checksums.py
